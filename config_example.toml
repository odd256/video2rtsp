# 全局码流开启设置 (可选: both, main, sub)
# both: 同时开启主码流和子码流 (默认)
# main: 仅开启主码流
# sub: 仅开启子码流
stream_mode = "both"

# 视频编码器设置
# 优先级：子流配置 > 流级别配置 > 全局配置
# 默认行为：
# - 子流：继承全局配置 (若未设置全局则默认为 libx264)
# - 主流：默认使用 "copy" 模式（透传，不转码），除非在 [[streams]] 中显式配置了 video_encoder
# 可选值:
#   copy       = 直接透传 (不转码，CPU 占用极低)
#   libx264    = CPU 软件编码
#   h264_nvenc = NVIDIA GPU 编码 (强烈推荐)
#   h264_qsv   = Intel 核显编码
#   h264_amf   = AMD GPU 编码
video_encoder = "h264_nvenc"  # 全局默认编码器配置

# 每路推流的启动间隔（秒），默认 0（不等待）
# 使用 GPU 编码（h264_nvenc / h264_qsv / h264_amf）时强烈建议配置此项：
#   - 消费级 GPU（GeForce 系列）并发 NVENC session 上限仅 3 路，错开启动可以避免
#     多路 session 同时初始化导致的 GPU 利用率瞬间飙满和超限崩溃
#   - 推荐值：0.5 ~ 1.0（流数量越多、GPU 越低端，建议值越大）
# 使用 CPU 编码（libx264 / copy）时可设为 0，无需等待
startup_delay = 0.5


[[streams]]
name = "Live_Stream_1"
url = "rtsp://localhost:8554/stream1"
files = [
  "videos/clip1.mp4",
  "videos/clip2.mp4"
]
loop = true
audio = false  # 主流默认也关闭音频

# 子码流示例：模拟低清晰度预览流
[[streams.sub_streams]]
name_suffix = "_sub"      # 最终名称: Live_Stream_1_sub
url_suffix = "_sub"       # 最终URL: rtsp://localhost:8554/stream1_sub
width = 640               # 宽度缩放到 640
height = 360              # 高度缩放到 360
video_bitrate = "500k"    # 限制视频码率为 500kbps
audio = false             # 子流默认关闭音频

[[streams]]
name = "Camera_2_Doorbell"
url = "rtsp://localhost:8554/cam2"
files = ["B_1.mp4"]
loop = true
video_encoder = "libx264"  # 该流的主流和子流将默认使用 libx264 (覆盖全局)

[[streams.sub_streams]]
name_suffix = "_sub"
video_encoder = "copy"      # 强制该子流使用 copy 模式 (尽管它可能被缩放，但在 copy 模式下缩放会失效，这里仅作演示)
