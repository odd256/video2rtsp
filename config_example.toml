# 全局码流开启设置 (可选: both, main, sub)
# both: 同时开启主码流和子码流 (默认)
# main: 仅开启主码流
# sub: 仅开启子码流
stream_mode = "both"

# 视频编码器 (仅在子码流转码时生效，主码流使用透传copy模式)
# libx264    = CPU 软件编码，兴容性最好，但多路推流时 CPU 占用高
# h264_nvenc = NVIDIA GPU 编码，RTX/GTX 独显推荐，CPU 占用极低
# h264_qsv   = Intel 核显编码
# h264_amf   = AMD GPU 编码
video_encoder = "libx264"  # 根据硬件选择对应编码器


[[streams]]
name = "Live_Stream_1"
url = "rtsp://localhost:8554/stream1"
files = [
  "videos/clip1.mp4",
  "videos/clip2.mp4"
]
loop = true
audio = false  # 主流默认也关闭音频

# 子码流示例：模拟低清晰度预览流
[[streams.sub_streams]]
name_suffix = "_sub"      # 最终名称: Live_Stream_1_sub
url_suffix = "_sub"       # 最终URL: rtsp://localhost:8554/stream1_sub
width = 640               # 宽度缩放到 640
height = 360              # 高度缩放到 360
video_bitrate = "500k"    # 限制视频码率为 500kbps
audio = false             # 子流默认关闭音频

[[streams]]
name = "Camera_2_Doorbell"
url = "rtsp://localhost:8554/cam2"
files = [
  "B_1.mp4"
]
loop = true
